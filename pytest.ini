[pytest]
# Run mock-heavy test files LAST to prevent sys.modules pollution
# during collection from affecting other tests.
testpaths = tests
python_files = test_*.py
# Workaround: test_generate_loop.py and test_eval_ppl_guardrails.py
# mock torch/src.* at module level, which pollutes sys.modules for
# subsequently-collected files. Using importlib mode partially helps.
import_mode = importlib
