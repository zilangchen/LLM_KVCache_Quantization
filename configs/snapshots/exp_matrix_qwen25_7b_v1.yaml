  - run_name: kivi_style_int8_curve_16k
    kv_mode: kivi_style
    quant_bits: 8
    calib_strategy: kivi_asymmetric
    use_attn_temperature: false
    decode_attn_impl: torch_ref
    seq_len: 16384
    gen_len: 64
    batch: 1

  # =========================================================================
  # KIVI-style INT4 — asymmetric quantization baseline
  # =========================================================================
  - run_name: kivi_style_int4_curve_4k
    kv_mode: kivi_style
