  # =========================================================================
  - run_name: int4_ours_curve_4k
    kv_mode: int4_ours
    quant_bits: 4
    calib_strategy: kl_attn
    calib_file: artifacts/kv_calib_kl_qwen25_7b_int4.json
    use_attn_temperature: true
    group_size_k: 32
    group_size_v: 32
    decode_attn_impl: triton_fused
    seq_len: 4096
    gen_len: 64
    batch: 1

  - run_name: int4_ours_curve_8k
    kv_mode: int4_ours
    quant_bits: 4
    calib_strategy: kl_attn
    calib_file: artifacts/kv_calib_kl_qwen25_7b_int4.json
