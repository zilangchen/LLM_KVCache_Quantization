  # =========================================================================
  # Long-context stress runs (seq_len + gen_len <= max_position_embeddings)
  # NOTE: Qwen2.5-7B max_position_embeddings is 131072; using 32704 for
  #       comparability with the 1.5B config.
  # =========================================================================
  - run_name: fp16_kv_long
    kv_mode: fp16
    quant_bits: 16
    calib_strategy: none
    use_attn_temperature: false
    decode_attn_impl: torch_ref
    seq_len: 32704
    gen_len: 64
    batch: 1

  - run_name: int8_baseline_long
    kv_mode: int8_baseline
    quant_bits: 8
    calib_strategy: percentile
    use_attn_temperature: false
    clip_percentile_k: 99.9
    clip_percentile_v: 99.9
    group_size_k: 16
    group_size_v: 16
    decode_attn_impl: torch_ref
    seq_len: 32704
    gen_len: 64
    batch: 1

  - run_name: int8_ours_long
