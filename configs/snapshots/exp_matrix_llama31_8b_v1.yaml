# External validity config: Llama-3.1-8B-Instruct
# Derived from: configs/snapshots/exp_matrix_week5_external_validity_v1.yaml
# Core runs only (no throughput sweep, no ablation variants).
# Used by scripts/run_experiments.py
#
# Conventions:
# - kv_mode: fp16 | int8_baseline | int8_ours | int4_baseline | int4_fused | int4_ours | kivi_style
# - calib_strategy: none | percentile | kl_attn | kivi_asymmetric
# - decode_attn_impl: torch_ref | triton_fused
# - use_attn_temperature: true/false (per-head inv_tau from calib file)
# - clip_percentile_{k,v}: used during calibration or as fixed percentile in percentile mode
# - group_size_{k,v}: grouping along head_dim (e.g., 32 for head_dim=128)
# - seq_len: context length budget (tokens)
# - gen_len: max_new_tokens

project:
  name: kv-cache-quant-llama31-8b
  # Downloaded via modelscope; use local path on remote.
  # HF model_id kept for reference: meta-llama/Llama-3.1-8B-Instruct
  model_id: /root/autodl-tmp/modelscope_cache/LLM-Research/Meta-Llama-3___1-8B-Instruct
  model_revision: null  # local path, no HF revision needed

runtime:
  seed: 1234
  device: cuda
  dtype: fp16
  decoding:
    temperature: 0.0
    top_p: 1.0
    top_k: 0
  quant_defaults:
    quant_bits: 8
    calib_strategy: kl_attn
    calib_file: artifacts/kv_calib_kl_llama31_8b_int8.json
    use_attn_temperature: true
    use_static_scales: true
    adaptive_static_scales: false
    adaptive_static_margin: 1.0
    adaptive_static_k: true
    adaptive_static_v: true
    clip_percentile_k: 99.5
    clip_percentile_v: 99.5
    group_size_k: 16
    group_size_v: 16
  kernel_defaults:
    decode_attn_impl: triton_fused

matrix:
  # =========================================================================
  # FP16 baselines — curve points (fixed gen_len=64 for comparability)
  # =========================================================================
  - run_name: fp16_kv_curve_4k
    kv_mode: fp16
    quant_bits: 16
    calib_strategy: none
    use_attn_temperature: false
    decode_attn_impl: torch_ref
    seq_len: 4096
    gen_len: 64
    batch: 1

  - run_name: fp16_kv_curve_8k
    kv_mode: fp16
    quant_bits: 16
    calib_strategy: none
    use_attn_temperature: false
    decode_attn_impl: torch_ref
