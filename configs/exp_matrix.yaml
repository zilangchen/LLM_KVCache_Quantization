# Experiment matrix (v2) — includes KL calibration + per-head temperature and fused decode attention kernel.
# Used by scripts/run_experiments.py
#
# Conventions:
# - kv_mode: fp16 | int8_baseline | int8_ours | int4_baseline | mixed
# - calib_strategy: none | percentile | kl_attn
# - decode_attn_impl: torch_ref | triton_fused
# - use_attn_temperature: true/false (per-head inv_tau from calib file)
# - clip_percentile_{k,v}: used during calibration or as fixed percentile in percentile mode
# - group_size_{k,v}: grouping along head_dim (e.g., 32 for head_dim=128)
# - seq_len: context length budget (tokens)
# - gen_len: max_new_tokens
#
# NOTE (repo policy):
# - PPL dataset is fixed in objective.md: wikitext-2-raw-v1
# - Needle eval uses synthetic needle-in-a-haystack (方案 A)
# - TTFT/TPOT timings synchronize around CUDA points for reliability

project:
  name: kv-cache-quant-qwen2p5-1p5b
  model_id: Qwen/Qwen2.5-1.5B-Instruct
  # Optionally pin model revision for strict reproducibility.
  # model_revision: <commit_hash_or_tag>

runtime:
  seed: 1234
  device: cuda
  dtype: fp16
  decoding:
    temperature: 0.0
    top_p: 1.0
    top_k: 0
  # Shared defaults for all runs unless overridden below.
  quant_defaults:
    quant_bits: 8
    calib_strategy: kl_attn
    calib_file: artifacts/kv_calib_kl.json
    use_attn_temperature: true
    clip_percentile_k: 99.9
    clip_percentile_v: 99.9
    group_size_k: 32
    group_size_v: 32
  kernel_defaults:
    decode_attn_impl: triton_fused

matrix:
  # Baselines
  - run_name: fp16_kv_torch
    kv_mode: fp16
    quant_bits: 16
    calib_strategy: none
    use_attn_temperature: false
    decode_attn_impl: torch_ref
    seq_len: 4096
    gen_len: 256
    batch: 1

  - run_name: int8_baseline_torch
    kv_mode: int8_baseline
    quant_bits: 8
    calib_strategy: percentile
    use_attn_temperature: false
    clip_percentile_k: 99.9
    clip_percentile_v: 99.9
    group_size_k: 128
    group_size_v: 128
    decode_attn_impl: torch_ref
    seq_len: 4096
    gen_len: 256
    batch: 1

  # Ours mainline: KL calibration + per-head temperature + group-wise + fused decode kernel
  - run_name: int8_ours_kl_temp_fused
    kv_mode: int8_ours
    quant_bits: 8
    calib_strategy: kl_attn
    calib_file: artifacts/kv_calib_kl.json
    use_attn_temperature: true
    group_size_k: 32
    group_size_v: 32
    decode_attn_impl: triton_fused
    seq_len: 4096
    gen_len: 256
    batch: 1

  # Ablations (recommended)
  - run_name: int8_ours_kl_no_temp_fused
    kv_mode: int8_ours
    quant_bits: 8
    calib_strategy: kl_attn
    calib_file: artifacts/kv_calib_kl.json
    use_attn_temperature: false
    group_size_k: 32
    group_size_v: 32
    decode_attn_impl: triton_fused
    seq_len: 4096
    gen_len: 256
    batch: 1

  - run_name: int8_ours_percentile_temp_fused
    kv_mode: int8_ours
    quant_bits: 8
    calib_strategy: percentile
    use_attn_temperature: true
    clip_percentile_k: 99.9
    clip_percentile_v: 99.9
    group_size_k: 32
    group_size_v: 32
    decode_attn_impl: triton_fused
    seq_len: 4096
    gen_len: 256
    batch: 1

  # Long-context stress runs (use smaller gen_len to reduce cost)
  - run_name: fp16_kv_long
    kv_mode: fp16
    quant_bits: 16
    calib_strategy: none
    use_attn_temperature: false
    decode_attn_impl: torch_ref
    seq_len: 32768
    gen_len: 64
    batch: 1

  - run_name: int8_ours_long_fused
    kv_mode: int8_ours
    quant_bits: 8
    calib_strategy: kl_attn
    calib_file: artifacts/kv_calib_kl.json
    use_attn_temperature: true
    group_size_k: 32
    group_size_v: 32
    decode_attn_impl: triton_fused
    seq_len: 32768
    gen_len: 64
    batch: 1
