# Experiment matrix (v2) — includes KL calibration + per-head temperature and fused decode attention kernel.
# Used by scripts/run_experiments.py
#
# Conventions:
# - kv_mode: fp16 | int8_baseline | int8_ours | int4_baseline | int4_fused | mixed
# - calib_strategy: none | percentile | kl_attn
# - decode_attn_impl: torch_ref | triton_fused
# - use_attn_temperature: true/false (per-head inv_tau from calib file)
# - clip_percentile_{k,v}: used during calibration or as fixed percentile in percentile mode
# - group_size_{k,v}: grouping along head_dim (e.g., 32 for head_dim=128)
# - seq_len: context length budget (tokens)
# - gen_len: max_new_tokens
#
# NOTE (repo policy):
# - PPL dataset is fixed in objective.md: wikitext-2-raw-v1
# - Needle eval uses synthetic needle-in-a-haystack (方案 A)
# - TTFT/TPOT timings synchronize around CUDA points for reliability

project:
  name: kv-cache-quant-qwen2p5-1p5b
  model_id: Qwen/Qwen2.5-1.5B-Instruct
  # Pinned model revision for strict reproducibility.
  model_revision: 989aa7980e4cf806f80c7fef2b1adb7bc71aa306

runtime:
  seed: 1234
  device: cuda
  dtype: fp16
  decoding:
    temperature: 0.0
    top_p: 1.0
    top_k: 0
  # Shared defaults for all runs unless overridden below.
  quant_defaults:
    quant_bits: 8
    calib_strategy: kl_attn
    # Default calibration is selected for fused performance (group_size=16).
    calib_file: artifacts/kv_calib_kl_selected_v3_quick.json
    use_attn_temperature: true
    use_static_scales: true
    adaptive_static_scales: false
    adaptive_static_margin: 1.0
    adaptive_static_k: true
    adaptive_static_v: true
    clip_percentile_k: 99.5
    clip_percentile_v: 99.5
    group_size_k: 16
    group_size_v: 16
  kernel_defaults:
    decode_attn_impl: triton_fused

