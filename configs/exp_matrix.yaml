  # Baselines
  - run_name: fp16_kv_torch
    kv_mode: fp16
    quant_bits: 16
    calib_strategy: none
    use_attn_temperature: false
    decode_attn_impl: torch_ref
    seq_len: 4096
    gen_len: 256
    batch: 1

  # Curve points (fixed gen_len=64 for comparability)
